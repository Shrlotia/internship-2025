<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IR codec</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
  </head>
  <body>
    <div class="container my-4">
      <h2>Decode</h2>
      <form onsubmit="onDecodeFormSubmit(event)">
        <div class="mb-3">
          <label for="rawSignalStr" class="form-label">Raw Signal String</label>
          <input type="text" class="form-control" id="rawSignalStr" aria-describedby="rawSignalHelp" value="BYgNVAaoAeAPAQPsBKgB4CMBwC/AB8AB4AcP4AMBwBtAB0ADwAHgAwtAAUAPQAPgBwHgAxNAC8AD4BsB4CMr4BMBQEdAAcAH4AsBQBvgBwPgAwFAG+APAUAbwAPgBwHAF8AH4AsBwBtAB8ABC+wEqAHsBKgBqAGoAQ==" required>
          <label for="timingStr" class="form-label">Timing String</label>
          <input type="text" class="form-control" id="timingStr" aria-describedby="timingHelp">
        </div>
        <button type="submit" class="btn btn-primary">Decode IR Signal</button>
      </form>
      <div id="decodedContainer" class="my-4" hidden>
        <h3>Decoded signal</h3>
        <div>Duration: <span id="durationSpan"></span>µs</div>
        <canvas id="irSignalCanvas" class="w-100" width="1280" height="250"></canvas>
        <div>
          <h4>Analysis</h4>
          <p class="text-muted" id="irSignal"></p>
          <form class="row gy-2 align-items-center" onsubmit="onAnalyzeFormSubmit(event)">
            <h5>Length (µs)</h5>
            <div class="col-auto">
              <label for="leadingPulseLength">Leading pulse</label>
              <input type="number" class="form-control" id="leadingPulseLength" min="0" step="1">
            </div>
            <div class="col-auto">
              <label for="leadingSpaceLength">Leading space</label>
              <input type="number" class="form-control" id="leadingSpaceLength" min="0" step="1">
            </div>
            <div class="col-auto">
              <label for="lowPulseLength">Low pulse</label>
              <input type="number" class="form-control" id="lowPulseLength" min="0" step="1">
            </div>
            <div class="col-auto">
              <label for="lowSpaceLength">Low space</label>
              <input type="number" class="form-control" id="lowSpaceLength" min="0" step="1">
            </div>
            <div class="col-auto">
              <label for="highPulseLength">High pulse</label>
              <input type="number" class="form-control" id="highPulseLength" min="0" step="1">
            </div>
            <div class="col-auto">
              <label for="highSpaceLength">High space</label>
              <input type="number" class="form-control" id="highSpaceLength" min="0" step="1">
            </div>
            <div class="col-auto">
              <label for="trailingPulseLength">Trailing pulse burst</label>
              <input type="number" class="form-control" id="trailingPulseLength" min="0" step="1">
            </div>
            <div class="col-auto">
              <label for="tolerance">Tolerance %</label>
              <input type="number" class="form-control" id="tolerance" min="0" max="1" step="0.05">
            </div>
            <div class="col-auto">
              <button type="submit" class="btn btn-primary">Analyze</button>
            </div>
          </form>
          <div id="resultsContainer" class="my-4" hidden>
            <h5>Result</h5>
            <label>Bits</label>
            <p class="text-muted" id="irBits"></p>
            <label>Bytes</label>
            <p class="text-muted" id="irBytes"></p>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
    <script>
      let canvas;
      let leadingPulseLengthInput;
      let leadingSpaceLengthInput;
      let highPulseLengthInput;
      let highSpaceLengthInput;
      let lowPulseLengthInput;
      let lowSpaceLengthInput;
      let trailingPulseLengthInput;
      let toleranceInput;

      let timings = {
        leadingPulse: 3500,
        leadingSpace: 1750,
        lowPulse: 435,
        lowSpace: 435,
        highPulse: 435,
        highSpace: 1300,
        trailingPulse: 435,
        tolerance: 0.1, // 10% tolerance
      };
      let irSignal = [];
      let irBits = [];
      let irBytes = [];

      document.addEventListener('DOMContentLoaded', () => {
        canvas = document.getElementById('irSignalCanvas');
        leadingPulseLengthInput = document.getElementById('leadingPulseLength');
        leadingSpaceLengthInput = document.getElementById('leadingSpaceLength');
        lowPulseLengthInput = document.getElementById('lowPulseLength');
        lowSpaceLengthInput = document.getElementById('lowSpaceLength');
        highPulseLengthInput = document.getElementById('highPulseLength');
        highSpaceLengthInput = document.getElementById('highSpaceLength');
        trailingPulseLengthInput = document.getElementById('trailingPulseLength');
        toleranceInput = document.getElementById('tolerance');

        leadingPulseLengthInput.value = timings.leadingPulse;
        leadingSpaceLengthInput.value = timings.leadingSpace;
        lowPulseLengthInput.value = timings.lowPulse;
        lowSpaceLengthInput.value = timings.lowSpace;
        highPulseLengthInput.value = timings.highPulse;
        highSpaceLengthInput.value = timings.highSpace;
        trailingPulseLengthInput.value = timings.trailingPulse;
        toleranceInput.value = timings.tolerance;
      });

      function renderIrSignal(irSignal) {
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const padding = 10;

        const length = irSignalDuration(irSignal);
        const scale = (canvas.width - 2 * padding) / length;
        ctx.fillStyle = 'green';
        let x = 0;
        for (let i = 0; i < irSignal.length; i++) {
          const duration = irSignal[i];
          if (i % 2 === 0) {
            ctx.fillRect(x + padding, 0, duration * scale, 200);
          }
          x += duration * scale;
        }
        ctx.fillStyle = 'black';
        ctx.fillRect(0 + padding, 200, canvas.width - padding, 2);
        ctx.textAlign = 'center';
        for (let i = 0; i < length; i += 2000) {
          if (i % 10000 === 0) {
            ctx.fillRect(i * scale + padding, 200, 2, 20);
            ctx.fillText(i / 1000, i * scale + padding, 240);
          } else {
            ctx.fillRect(i * scale + padding, 200, 1, 10);
          }
        }

      }

      function onDecodeFormSubmit(event) {
        event.preventDefault();
        const rawSignalStr = document.getElementById('rawSignalStr').value;
        const timingStr = document.getElementById('timingStr').value;
        if (timingStr) {
          irSignal = timingStr.split(' ').map((s) => parseInt(s.trim(), 10));
        } else {
          irSignal = decodeIr(rawSignalStr);
        }
        
        document.getElementById('decodedContainer').hidden = false;
        document.getElementById('irSignal').innerHTML = irSignal.join(', ');
        document.getElementById('durationSpan').innerHTML = irSignalDuration(irSignal);
        renderIrSignal(irSignal)
        document.getElementById('resultsContainer').hidden = true;
      }
    
      function decodeIr(rawSignalStr) {
        const rawSignal = new Uint8Array(
          [...atob(rawSignalStr)].map((char) => char.charCodeAt(0))
        );
        const signal = decompress(rawSignal);
        const irSignal = [];
        for (let i = 0; i < signal.length; i += 2) {
          irSignal.push(signal[i + 1] * 256 + signal[i]);
        }
        return irSignal;
      }

      function irSignalDuration(irSignal) {
        return irSignal.reduce((s, d) => s + d, 0);
      }

      function decompress(input) {
        const output = [];
        let src = 0;
        let dest = 0;
        while (src < input.length) {
          const type = input[src] >> 5;
          if (type === 0) {
            let len = 1 + input[src];
            console.log(`Block ${input.subarray(src, src + 1).toString('hex')} is literal block, len=${len}, data=${input.subarray(src + 1, src + 1 + len).toString('hex')}`);
            src++;
            while (len > 0) {
              output[dest] = input[src];
              src++;
              dest++;
              len--;
            }
          } else if (type < 7) {
            const ofs = 256 * (input[src] & 31) + input[src + 1];
            let len = 2 + (input[src] >> 5);
            console.log(`Block ${input.subarray(src, src + 2).toString('hex')} is short match block, len=${len}, ofs=${ofs}`);
            src += 2;
            let ref = dest - ofs - 1;
            while (len > 0) {
              output[dest] = output[ref];
              ref++;
              dest++;
              len--;
            }
          } else {
            const ofs = 256 * (input[src] & 31) + input[src + 2];
            let len = 9 + input[src + 1];
            console.log(`Block ${input.subarray(src, src + 3).toString('hex')} is long match block, len=${len}, ofs=${ofs}`);
            src += 3;
            let ref = dest - ofs - 1;
            while (len > 0) {
              output[dest] = output[ref];
              ref++;
              dest++;
              len--;
            }
          }
        }
        return output;
      }
    
      function onAnalyzeFormSubmit(event) {
        event.preventDefault();
        timings.leadingPulse = parseInt(leadingPulseLengthInput.value, 10);
        timings.leadingSpace = parseInt(leadingSpaceLengthInput.value, 10);
        timings.lowPulse = parseInt(lowPulseLengthInput.value, 10);
        timings.lowSpace = parseInt(lowSpaceLengthInput.value, 10);
        timings.highPulse = parseInt(highPulseLengthInput.value, 10);
        timings.highSpace = parseInt(highSpaceLengthInput.value, 10);
        timings.trailingPulse = parseInt(trailingPulseLengthInput.value, 10);
        timings.tolerance = parseFloat(toleranceInput.value);
        console.log('Timings:', timings);
        try {
          irBits = analyze(irSignal, timings);
          irBytes = bitsToBytes(irBits);
          document.getElementById('resultsContainer').hidden = false;
          document.getElementById('irBits').innerHTML = irBits.map((bit, index) => bit + (index > 0 && index % 8 === 0 ? ' ' : '')).join(''); 
          document.getElementById('irBytes').innerHTML = irBytes.map(byte => byte.toString(16).padStart(2, '0')).join(' ');
        } catch (error) {
          alert(`Error analyzing IR signal: ${error.message}`);
          return;
        }
      }

      function closeTo(target, value, tolerance = 0.1) {
        return Math.abs(target - value) <= tolerance * target;
      }

      function analyze(irSignals, timings) {
        const bits = [];
        if (irSignals.length < 2) {
          throw new Error('IR signal must contain at least two elements');
        }
        let leadingPulse = irSignals[0];
        let leadingSpace = irSignals[1];
        if (!closeTo(timings.leadingPulse, leadingPulse, timings.tolerance) || !closeTo(timings.leadingSpace, leadingSpace, timings.tolerance)) {
          throw new Error('Leading pulse burst or leading space does not match expected values');
        }
        const end = irSignals.length - (timings.trailingPulse > 0 ? 1 : 0);
        for (let i = 2; i < end; i += 2) {
          const pulse = irSignals[i];
          const space = irSignals[i + 1];
          if (closeTo(timings.lowPulse, pulse, timings.tolerance) && closeTo(timings.lowSpace, space, timings.tolerance)) {
            bits.push(0); // Low pulse and space
          } else if (closeTo(timings.highPulse, pulse, timings.tolerance) && closeTo(timings.highSpace, space, timings.tolerance)) {
            bits.push(1); // High pulse and space
          } else {
            console.log({
              lowPulse: closeTo(timings.lowPulse, pulse, timings.tolerance),
              lowSpace: closeTo(timings.lowSpace, space, timings.tolerance),
              highPulse: closeTo(timings.highPulse, pulse, timings.tolerance),
              highSpace: closeTo(timings.highSpace, space, timings.tolerance),
            });
            console.log({
              lowPulseDiff: Math.abs(timings.lowPulse - pulse),
              lowPulseTolerance: timings.lowPulse * timings.tolerance,
              lowSpaceDiff: Math.abs(timings.lowSpace - space),
              lowSpaceTolerance: timings.lowSpace * timings.tolerance,
              highPulseDiff: Math.abs(timings.highPulse - pulse),
              highPulseTolerance: timings.highPulse * timings.tolerance,
              highSpaceDiff: Math.abs(timings.highSpace - space),
              highSpaceTolerance: timings.highSpace * timings.tolerance,
            })
            throw new Error(`Unexpected pulse/space pair at index ${i}: ${pulse}/${space}`);
          }
        }
        if (timings.trailingPulse > 0 && !closeTo(timings.trailingPulse, irSignals[end], timings.tolerance)) {
          throw new Error('Trailing pulse burst does not match expected value');
        }
        return bits;
      }

      function bitsToBytes(bits) {
        const bytes = [];
        for (let i = 0; i < bits.length; i += 8) {
          let byte = 0;
          for (let j = 0; j < 8 && i + j < bits.length; j++) {
            byte = (byte << 1) | bits[i + j];
          }
          bytes.push(byte);
        }
        return bytes;
      }
    </script>
  </body>
</html>
